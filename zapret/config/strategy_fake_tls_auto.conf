# FAKE TLS AUTO Strategy - Best for most Russian ISPs
# Works by injecting fake TLS client hello to confuse DPI

NFQWS_OPT="--filter-tcp=80,443 --hostlist=/opt/zapret/list/list-general-user.txt --dpi-desync=fake,multisplit --dpi-desync-split-seqovl=681 --dpi-desync-split-pos=1 --dpi-desync-fooling=ts --dpi-desync-repeats=8 --dpi-desync-split-seqovl-pattern=/opt/zapret/files/fake/tls_clienthello_www_google_com.bin --dpi-desync-fake-tls=/opt/zapret/files/fake/tls_clienthello_www_google_com.bin --new"

# UDP for STUN/QUIC
NFQWS_OPT="$NFQWS_OPT --filter-udp=443 --hostlist=/opt/zapret/list/list-general-user.txt --dpi-desync=fake --dpi-desync-repeats=6 --new"

# Discord UDP
NFQWS_OPT="$NFQWS_OPT --filter-udp=50000-50100 --filter-l7=discord,stun --dpi-desync=fake --dpi-desync-repeats=6 --new"

TPWS_OPT="--split-pos=1,midsld --disorder"

export NFQWS_OPT TPWS_OPT