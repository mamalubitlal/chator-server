# Dex Configuration for чатор
# https://dexidp.io/docs/configuration/
# 
# Environment variables (set in Render dashboard):
# - DEX_ISSUER: Your Dex URL (e.g., https://chator-auth.onrender.com)
# - DEX_CLIENT_SECRET: Shared secret with Synapse
# - SYNAPSE_URL: Your Synapse URL (e.g., https://chator-matrix.onrender.com)
# - DEX_STATIC_PASSWORD_EMAIL: Admin email (default: admin@chator.local)
# - DEX_STATIC_PASSWORD_USERNAME: Admin username (default: admin)
# - DEX_STATIC_PASSWORD_HASH: Bcrypt hash of admin password (REQUIRED!)

# Public URL where Dex is accessible
issuer: ${DEX_ISSUER}

# Storage - SQLite for simplicity (free tier)
storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

# Web interface
web:
  http: 0.0.0.0:5556

# Clients that can use Dex for OIDC
staticClients:
- id: matrix-synapse
  redirectURIs:
  - '${SYNAPSE_URL}/_synapse/client/oidc/callback'
  name: 'Matrix Synapse'
  secret: '${DEX_CLIENT_SECRET}'

# Connectors - how users authenticate
connectors:
# Static password connector (built-in)
- type: mockPasswordDB
  id: logins
  name: Email
  config:
    usernames:
    - email: "${DEX_STATIC_PASSWORD_EMAIL:-admin@chator.local}"
      password: "${DEX_STATIC_PASSWORD_HASH}"
      username: "${DEX_STATIC_PASSWORD_USERNAME:-admin}"
      userID: "1"

# Enable password connector
enablePasswordDB: true

# Logging
logging:
  level: "info"
  format: "text"
