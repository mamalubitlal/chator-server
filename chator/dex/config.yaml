# Dex Configuration for чатор
# https://dexidp.io/docs/configuration/

# Public URL where Dex is accessible
# Set DEX_ISSUER env var on Render: https://your-app.onrender.com
issuer: ${DEX_ISSUER}

# Storage - SQLite for simplicity (free tier)
storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

# Web interface
web:
  http: 0.0.0.0:5556

# Clients that can use Dex for OIDC
staticClients:
- id: matrix-synapse
  redirectURIs:
  - '${SYNAPSE_URL}/_synapse/client/oidc/callback'
  name: 'Matrix Synapse'
  secret: '${DEX_CLIENT_SECRET}'

# Connectors - how users authenticate
connectors:
# Static password connector (built-in, no external service needed)
- type: mockPasswordDB
  id: logins
  name: Email
  config:
    # Add users here - generate hashes with:
    # docker run ghcr.io/dexidp/dex:latest dex password hash YOURPASSWORD
    usernames:
    - email: "admin@chator.local"
      password: "$2a$10$2b2c9e3b8f8e8c8d8e8f8g8h8i8j8k8l8m8n8o8p8q8r8s8t8u8v"
      username: "admin"
      userID: "1"

# Enable password connector
enablePasswordDB: true

# Logging
logging:
  level: "info"
  format: "text"
