# Coturn TURN server configuration for Chator

# Listening port
listening-port=3478
tls-listening-port=3479
alt-listening-port=5556
alt-tls-listening-port=5557

# Listening address
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# External IP - remove comment to set manually
# external-ip=YOUR_PUBLIC_IP

# No user database - use static secret
# The secret is configured via environment or -key option

# Authentication
static-auth-secret=chator-test-secret
realm=chator.local

# Database (empty for ephemeral)
# In production, use turnserver secret from env