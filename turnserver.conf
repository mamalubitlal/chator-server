# Coturn TURN/STUN server config for Chator
# Runs as separate container (coturn/coturn)

# Ports
listening-port=3478
tls-listening-port=3479
alt-listening-port=5556
alt-tls-listening-port=5557

# Listen on all interfaces (inside container)
listening-ip=0.0.0.0
relay-ip=0.0.0.0
# external-ip=YOUR_PUBLIC_IP/YOUR_PRIVATE_IP  # Set for NAT/production; omit for local/Codespaces (auto-detect)

# Relay port range
min-port=49160
max-port=49180

# Static auth secret — must match Synapse's homeserver.yaml
static-auth-secret=chator-test-secret
realm=chator.local

# Auth mechanism
lt-cred-mech
use-auth-secret

# Security
no-multicast-peers
no-cli

# Rate limiting
total-quota=100
stale-nonce=600

# Logging
verbose
