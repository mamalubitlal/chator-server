# Chator nginx config — bare-metal
# Serves Element Web at /, proxies Synapse on :8009, LiveKit on :7880
server {
    listen 8008;
    server_name _;
    root /usr/share/element-web;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Synapse API
    location /_matrix {
        proxy_pass http://localhost:8009;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
    location /_synapse {
        proxy_pass http://localhost:8009;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://localhost:8009/health;
    }

    # Element Call
    location /call/ {
        alias /usr/share/element-call/;
        try_files $uri $uri/ /call/index.html;
    }

    # LiveKit WebSocket + API
    location /livekit {
        proxy_pass http://localhost:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /livekit/jwt/sfu/get {
        proxy_pass http://localhost:8070/sfu/get;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /livekit/jwt/get_token {
        proxy_pass http://localhost:8070/get_token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /livekit/jwt/ {
        proxy_pass http://localhost:8070/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known for Matrix discovery
    location /.well-known/ {
        alias /var/lib/chator/.well-known/;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-Requested-With, Content-Type, Authorization" always;
        try_files $uri =404;
    }

    # Static assets with long cache
    location /themes/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Element Web SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Federation endpoint (HTTPS, for lk-jwt OpenID userinfo)
server {
    listen 8448 ssl;
    server_name _;
    ssl_certificate /etc/nginx/certs/chator.crt;
    ssl_certificate_key /etc/nginx/certs/chator.key;

    location /_matrix {
        proxy_pass http://localhost:8009;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $host;
    }
}
