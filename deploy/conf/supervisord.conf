[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:synapse]
command=/opt/chator/venv/bin/python -m synapse.app.homeserver --config-path /etc/matrix-synapse/homeserver.yaml
user=matrix-synapse
directory=/var/lib/matrix-synapse
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/synapse.log
stderr_logfile=/var/log/supervisor/synapse-error.log
environment=HOME="/var/lib/matrix-synapse",LD_PRELOAD="/usr/lib/x86_64-linux-gnu/libjemalloc.so.2"

[program:livekit]
command=/usr/local/bin/livekit-server --config /etc/livekit.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/livekit/livekit.log
stderr_logfile=/var/log/livekit/livekit-error.log

[program:livekit-jwt]
command=/usr/local/bin/lk-jwt-service
directory=/var/lib/chator
autostart=true
autorestart=true
stdout_logfile=/var/log/livekit/jwt.log
stderr_logfile=/var/log/livekit/jwt-error.log
environment=LIVEKIT_URL="wss://chator-frp.onrender.com/livekit",LIVEKIT_KEY="LKISupervisorSecret-Changer-in-production",LIVEKIT_SECRET="chator_livekit_secret_change_me",LIVEKIT_JWT_BIND=":8070",LIVEKIT_INSECURE_SKIP_VERIFY_TLS="YES_I_KNOW_WHAT_I_AM_DOING"

[program:coturn]
command=/usr/bin/turnserver -c /etc/turnserver.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/coturn.log
stderr_logfile=/var/log/supervisor/coturn-error.log

[program:sydent]
command=/opt/chator/venv/bin/sydent
directory=/var/lib/chator
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/sydent.log
stderr_logfile=/var/log/supervisor/sydent-error.log

[program:cloudflared-doh]
command=/usr/local/bin/cloudflared proxy-dns --port 5053 --address 127.0.0.1 --upstream https://1.1.1.1/dns-query --upstream https://dns.google/dns-query
autostart=true
autorestart=true
exitcodes=0
stdout_logfile=/var/log/supervisor/cloudflared.log
stderr_logfile=/var/log/supervisor/cloudflared-error.log

[program:nginx]
command=/usr/sbin/nginx -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx-error.log
