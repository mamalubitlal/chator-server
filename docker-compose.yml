volumes:
  caddy_data:

services:
  coturn:
    image: instrumentisto/coturn:latest
    container_name: chator-turn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "3479:3479/udp"
      - "3479:3479/tcp"
      - "5556:5556/udp"
      - "5556:5556/tcp"
      - "49160-49180:49160-49180/udp"
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  chator:
    image: chator:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chator
    ports:
      - "8008:8008"
    volumes:
      - ./data:/data
    depends_on:
      - coturn
    environment:
       - SYNAPSE_SERVER_NAME=chator.local
       - SYNAPSE_PUBLIC_URL=${CHATOR_PUBLIC_URL:-https://localhost}
       - COTURN_ENABLED=true
       - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
       - SYNAPSE_REPORT_STATS=no
       # Zapret DPI Bypass
       - ZAPRET_ENABLED=false
       - ZAPRET_REDETECT=true
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    # Set ip_forward on host if needed for zapret
    sysctls:
      - net.ipv4.ip_forward=1

  caddy:
    image: dockerhub.timeweb.cloud/library/caddy:latest
    container_name: chator-caddy
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped
    depends_on:
      - chator

  # Frp client: connects to Render-hosted frps (use: docker compose --profile frp up)
  frpc:
    build:
      context: ./frp
      dockerfile: Dockerfile.frpc
    container_name: chator-frpc
    profiles: ["frp"]
    environment:
      - FRP_SERVER=${FRP_SERVER:-chator-frp.onrender.com}
      - AUTH_TOKEN=${AUTH_TOKEN:-chator-frp-secret}
    restart: unless-stopped
    depends_on:
      - caddy

  # Cloudflare Tunnel (use: docker compose --profile tunnel up)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: chator-cloudflared
    profiles: ["cloudflare"]
    command: tunnel --protocol http2 --url http://caddy:80
    environment:
      - TUNNEL_TRANSPORT_PROTOCOL=http2
      - TUNNEL_QUIC_DISABLE=true
    restart: unless-stopped
    depends_on:
      - caddy