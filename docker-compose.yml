services:
  coturn:
    image: coturn/coturn:latest
    container_name: chator-turn
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    environment:
      - TURN_SERVER_NAME=chator.local

  synapse:
    image: chator:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chator-synapse
    network_mode: host
    volumes:
      - ./data:/data
    depends_on:
      - coturn
    extra_hosts:
      - "db.parolaegtntaamnrxbqr.supabase.co:8.47.69.6"
    environment:
      - SYNAPSE_SERVER_NAME=chator.local
      - SYNAPSE_REPORT_STATS=no
      # Zapret DPI Bypass
      - ZAPRET_ENABLED=true
      - ZAPRET_REDETECT=true  # Run auto-detect on first run
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1